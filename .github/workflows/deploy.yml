name: Deploy to Heteml

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 ssh-rainyday-design.heteml.net >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -p 2222 -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='.github' \
            ./ ${{ secrets.SSH_USER }}@ssh-rainyday-design.heteml.net:/home/users/1/rainyday-design/web/en-solutions.jp/
